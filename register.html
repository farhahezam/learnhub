<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>register</title>

   <!-- font awesome cdn link  -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css">

   <!-- custom css file link  -->
   <link rel="stylesheet" href="css/style.css">

</head>
<body class="register-page">

<header class="header register-header">
   <section class="flex">

      <a href="home.html" class="logo">LearnHUB</a>

      <div class="icons">
         <div id="toggle-btn" class="fas fa-sun"></div>
      </div>

   </section>
</header>



<section class="form-container">

   <form id="registerForm" action="login.html" method="post" enctype="multipart/form-data">
      <h3>register now</h3>
      <p>your name <span>*</span></p>
      <input type="text" name="name" placeholder="enter your name" required maxlength="50" class="box">
      <p>your email <span>*</span></p>
      <input type="email" name="email" placeholder="enter your email" required maxlength="50" class="box">
      <p>your password <span>*</span></p>
      <input type="password" name="pass" placeholder="enter your password" required maxlength="20" class="box">
      <p>confirm password <span>*</span></p>
      <input type="password" name="c_pass" placeholder="confirm your password" required maxlength="20" class="box">
      <p>select profile <span>*</span></p>
      <input type="file" id="profilePic" accept="image/*" required class="box">
      <input type="submit" value="Register New" name="submit" class="btn">
      <div class="signup-link">
         Already have an account? <a href="login.html">Login</a>
      </div>
   </form>

</section>















<footer class="footer">

   &copy; copyright @ 2025 by <span>LearnHUB</span> | all rights reserved!

</footer>

<!-- custom js file link  -->
<script src="js/script.js"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', function(e){
   e.preventDefault();

   const name = document.querySelector('input[name="name"]').value;
   const email = document.querySelector('input[name="email"]').value;
   const pass = document.querySelector('input[name="pass"]').value;
   const imageInput = document.getElementById('profilePic');

   const reader = new FileReader();

   reader.onload = function(){
      const user = {
         name: name,
         email: email,
         password: pass,
         role: "student",
         image: reader.result   // BASE64 IMAGE
      };

      localStorage.setItem('user', JSON.stringify(user));
      alert("Registration successful!");
      window.location.href = "login.html";
   };

   reader.readAsDataURL(imageInput.files[0]);
});

// RESET localStorage for new user
document.getElementById('registerForm').addEventListener('submit', function(e){
  e.preventDefault();

  const name = document.querySelector('input[name="name"]').value;
  const email = document.querySelector('input[name="email"]').value;
  const pass = document.querySelector('input[name="pass"]').value;
  const imageInput = document.getElementById('profilePic');

  const reader = new FileReader();

  reader.onload = function(){

    // 🔥 CLEAR OLD USER DATA (ONLY HERE)
    localStorage.removeItem('user');
    localStorage.removeItem('loggedIn');
    localStorage.removeItem('quizProgress');
    localStorage.removeItem('purchasedCourses');
    localStorage.removeItem('productsInCart');

    const user = {
      name: name,
      email: email,
      password: pass,
      role: "student",
      image: reader.result
    };

    // SAVE NEW USER
    localStorage.setItem('user', JSON.stringify(user));

    alert("Registration successful!");
    window.location.href = "login.html";
  };

  reader.readAsDataURL(imageInput.files[0]);
});


</script>



   
</body>
</html>
