<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Cart - Educa</title>

   <!-- font awesome cdn -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css">

   <!-- custom css -->
   <link rel="stylesheet" href="css/style.css">
<style>
      .product_row {
   display: grid;
   grid-template-columns: 2fr 1fr 1fr 1fr;
   align-items: center;
   padding: 15px 0;
   border-bottom: 1px solid #ddd;
}

.product_item {
   display: flex;
   align-items: center;
   gap: 15px;
}

.cartImg {
   width: 80px;
   height: auto;
   border-radius: 8px;
}

.removeBtn {
   background: none;
   border: none;
   color: red;
   cursor: pointer;
   font-size: 14px;
   padding: 0;
}

.price, .quantity, .total {
   text-align: center;
}

   </style>
</head>
<body>

   <header class="header">
      
      <section class="flex">

         <a href="index.html" class="logo">LearnHUB</a>

         <form action="search.html" method="get" class="search-form">
   <input type="text" name="query" placeholder="search courses..." required>
   <button type="submit" class="fas fa-search"></button>
</form>


         <div class="icons">
            <div id="menu-btn" class="fas fa-bars"></div>
            <div id="search-btn" class="fas fa-search"></div>
            <div id="user-btn" class="fas fa-user"></div>
            <div id="toggle-btn" class="fas fa-sun"></div>
            <a href="cart.html"><div id="cart-btn" class="fa-solid fa-cart-shopping"></div></a>

         </div>

         <div class="profile">
            <img src="images/pic-1.jpg" class="image user-avatar" alt="">
            <h3 class="profile-name"></h3>
            <p class="profile-role"></p>
            
            <div class="profile-actions">
               <a href="profile.html" class="btn">view profile</a>
               <a href="#" class="logoutBtn option-btn">logout</a>

            </div>

         </div>

      </section>

   </header>   

   <div class="side-bar">

      <div id="close-btn">
         <i class="fas fa-times"></i>
      </div>

      <div class="profile">
         <img src="images/pic-1.jpg" class="image user-avatar" alt="">
         <h3 class="profile-name"></h3>
         <p class="profile-role"></p>

         <a href="profile.html" class="btn">view profile</a>
      </div>

      <nav class="navbar">
      <a href="index.html"><i class="fas fa-home"></i><span>home</span></a>
      <a href="courses.html"><i class="fas fa-graduation-cap"></i><span>courses</span></a>
      <a href="teachers.html"><i class="fas fa-chalkboard-user"></i><span>teachers</span></a>
      <a href="feedback.html"><i class="fas fa-comments"></i><span>Discussion Forum</span></a>
   </nav>

   </div>

<!-- CART SECTION -->
<section class="product_container">
   <div class="product_header">
      <h5 class="product_title">COURSE</h5>
      <h5 class="price">PRICE</h5>
      <h5 class="quantity">QUANTITY</h5>
      <h5 class="total">TOTAL</h5>
   </div>

   <div class="products" id="cartProducts">
      <p>Your cart is empty</p>
   </div>
</section>

<!-- PAYMENT SECTION -->
<section class="paymentDiv">
   <h1><u>Complete Your Payment</u></h1>
   <form class="paymentDivForm" onsubmit="completePayment(); return false;">
      <strong class="CheckOutPayment"></strong>
      <input type="text" placeholder="Name on card" required />
      <input type="number" placeholder="Card Number" required />
      <input type="month" placeholder="Expiry Month" required />
      <input type="password" placeholder="CVV" required />
      <div class="paymentBttnDiv">
         <button type="submit" class="confirmPaymentButton paymentBttn">Confirm Payment</button>
         <button type="button" class="cancelPaymentButton paymentBttn">Cancel Payment</button>
      </div>
   </form>
   <footer class="paymentFooter">
      
   </footer>
</section>


<footer class="footer">

   &copy; copyright @ 2025 by <span>LearnHUB</span> | all rights reserved!

</footer>

<script>
   // ================= LOCAL STORAGE HELPERS =================
   function getCart() { return JSON.parse(localStorage.getItem("productsInCart")) || { itemsArray: [], totalCost: 0 }; }
   function setCart(cart) { localStorage.setItem("productsInCart", JSON.stringify(cart)); }

  
function showCart() {
   const cart = getCart();
   const container = document.getElementById("cartProducts");
   container.innerHTML = "";

   if (cart.itemsArray.length === 0) {
      container.innerHTML = "<p>Your cart is empty</p>";
      return;
   }

   cart.itemsArray.forEach(item => {
      container.innerHTML += `
         <div class="product_row">
            <!-- COURSE -->
            <div class="product_item">
               
               <div>
                  <h3>${item.name}</h3>
                  <button class="removeBtn" onclick="removeItem('${item.name}')">Remove</button>
               </div>
            </div>

            <!-- PRICE -->
            <div class="price">RM ${item.price}.00</div>

            <!-- QUANTITY -->
            <div class="quantity">${item.inCart}</div>

            <!-- TOTAL -->
            <div class="total">RM ${item.price * item.inCart}.00</div>
         </div>
      `;
   });

   container.innerHTML += `
      <div class="cartTotalContainer">
         <h4><strong>Cart Total:</strong> RM ${cart.totalCost}.00</h4>
         <button class="Checkout_button" onclick="showPayment()">Check Out</button>
      </div>
   `;
}



   function removeItem(name){
      let cart = getCart();
      cart.itemsArray = cart.itemsArray.filter(i => i.name !== name);
      cart.totalCost = cart.itemsArray.reduce((acc, i) => acc + (i.price * i.inCart), 0);
      setCart(cart);
      showCart();
   }

   function showPayment(){
      const cart = getCart();
      document.querySelector(".paymentDiv").style.visibility = "visible";
      document.querySelector(".CheckOutPayment").innerHTML = `Total: RM ${cart.totalCost}.00`;
   }

   document.querySelector(".cancelPaymentButton").addEventListener("click", () => {
      document.querySelector(".paymentDiv").style.visibility = "hidden";
   });

   function completePayment(){
      const cart = getCart();
      if(cart.itemsArray.length === 0) return;

      const purchased = JSON.parse(localStorage.getItem("purchasedCourses")) || {};
      cart.itemsArray.forEach(item => purchased[item.key] = true);
      localStorage.setItem("purchasedCourses", JSON.stringify(purchased));
      localStorage.removeItem("productsInCart");

      alert("Payment successful! Courses are now unlocked in MyProfile.");
      showCart();
      document.querySelector(".paymentDiv").style.visibility = "hidden";
   }

   // =================== EXPOSE FOR PLAYLIST ===================
   window.addCourseToCart = function(courseKey){
      const coursesData = {
         javascript: {name:"Complete JavaScript Tutorial", price:1000, thumb:"images/thumb-3.png", key:"javascript", inCart:1},
         bootstrap: {name:"Complete Bootstrap Tutorial", price:800, thumb:"images/thumb-4.png", key:"bootstrap", inCart:1},
         php: {name:"Complete PHP Tutorial", price:1200, thumb:"images/thumb-7.png", key:"php", inCart:1},
         // Add more paid courses here...
      };

      if(!coursesData[courseKey]) return;
      let cart = getCart();

      // prevent duplicates
      if(cart.itemsArray.find(i => i.key===courseKey)){
         alert("Course already in cart!");
         return;
      }

      cart.itemsArray.push(coursesData[courseKey]);
      cart.totalCost = (cart.totalCost || 0) + coursesData[courseKey].price;
      setCart(cart);
      showCart();
      alert(coursesData[courseKey].name + " added to cart!");
   }

   // Initial render
   showCart();
</script>

<script src="js/script.js"></script>
</body>
</html>
