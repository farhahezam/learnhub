<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Search Courses</title>

   <!-- Font Awesome CDN -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css">

   <!-- Custom CSS -->
   <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="header">
   <section class="flex">

      <a href="index.html" class="logo">LearnHUB</a>

      <form action="search.html" method="get" class="search-form">
         <input type="text" name="query" placeholder="Search courses..." required maxlength="100">
         <button type="submit" class="fas fa-search"></button>
      </form>

      <div class="icons">
         <div id="menu-btn" class="fas fa-bars"></div>
         <div id="search-btn" class="fas fa-search"></div>
         <div id="user-btn" class="fas fa-user"></div>
         <div id="toggle-btn" class="fas fa-sun"></div>
         <a href="cart.html"><div id="cart-btn" class="fa-solid fa-cart-shopping"></div></a>
      </div>

      <div class="profile">
         <img src="images/pic-1.jpg" class="image user-avatar" alt="">
         <h3 class="profile-name"></h3>
         <p class="profile-role"></p>
         <div class="profile-actions">
            <a href="profile.html" class="btn">view profile</a>
            <a href="#" class="logoutBtn option-btn">logout</a>
         </div>
      </div>

   </section>
</header>

<!-- ================= SIDEBAR ================= -->
<div class="side-bar">
   <div id="close-btn"><i class="fas fa-times"></i></div>
   <div class="profile">
      <img src="images/pic-1.jpg" class="image user-avatar" alt="">
      <h3 class="profile-name"></h3>
      <p class="profile-role"></p>
      <a href="profile.html" class="btn">view profile</a>
   </div>
   <nav class="navbar">
      <a href="index.html"><i class="fas fa-home"></i><span>home</span></a>
      <a href="courses.html"><i class="fas fa-graduation-cap"></i><span>courses</span></a>
      <a href="teachers.html"><i class="fas fa-chalkboard-user"></i><span>teachers</span></a>
      <a href="feedback.html"><i class="fas fa-comments"></i><span>Discussion Forum</span></a>
   </nav>
</div>

<!-- ================= SEARCH RESULTS ================= -->
<section class="courses">
   <h1 class="heading">Search Results</h1>
   <div class="box-container" id="searchResults"></div>
</section>

<!-- ================= FOOTER ================= -->
<footer class="footer">
   &copy; 2025 <span>LearnHUB</span> | All rights reserved
</footer>

<!-- ================= SCRIPT ================= -->
<script>
/* ===== COURSE DATA ===== */
const courses = {
 html:{ title:"Complete HTML Tutorial", thumb:"images/thumb-1.png", tutor:"Adib Rahman" },
 css:{ title:"Complete CSS Tutorial", thumb:"images/thumb-2.png", tutor:"Nur Hidayah" },
 javascript:{ title:"Complete JavaScript Tutorial", thumb:"images/thumb-3.png", tutor:"Syafiq Azman" },
 bootstrap:{ title:"Complete Bootstrap Tutorial", thumb:"images/thumb-4.png", tutor:"Nur Hidayah" },
 jquery:{ title:"Complete jQuery Tutorial", thumb:"images/thumb-5.png", tutor:"Syafiq Azman" },
 sass:{ title:"Complete SASS Tutorial", thumb:"images/thumb-6.png", tutor:"Farah Noor" },
 php:{ title:"Complete PHP Tutorial", thumb:"images/thumb-7.png", tutor:"Farah Noor" },
 mysql:{ title:"Complete MySQL Tutorial", thumb:"images/thumb-8.png", tutor:"Adib Rahman" },
 react:{ title:"Complete React Tutorial", thumb:"images/thumb-9.png", tutor:"Syafiq Azman" }
};

/* ===== GET SEARCH QUERY ===== */
const params = new URLSearchParams(window.location.search);
const query = params.get("query")?.toLowerCase() || "";

const resultsBox = document.getElementById("searchResults");

/* ===== FILTER & DISPLAY RESULTS ===== */
let found = false;

for (const key in courses) {
 if (courses[key].title.toLowerCase().includes(query)) {
   found = true;
   resultsBox.innerHTML += `
     <div class="box">
        <div class="thumb">
           <img src="${courses[key].thumb}" alt="${courses[key].title}">
        </div>
        <h3 class="title">${courses[key].title}</h3>
        <p>Instructor: ${courses[key].tutor}</p>
        <a href="playlist.html?course=${key}" class="inline-btn">
           View Course
        </a>
     </div>
   `;
 }
}

if (!found) {
 resultsBox.innerHTML = "<p>No courses found.</p>";
}
</script>

</body>
</html>
