<!-- custom js file link  -->
<script src="js/script.js"></script>
   <script>
document.addEventListener("DOMContentLoaded", function () {

/* ================== COURSE DATA ================== */
const courses = {
 html:{title:"Complete HTML Tutorial",free:true,quizzes:3},
 css:{title:"Complete CSS Tutorial",free:true,quizzes:3},
 javascript:{title:"Complete JavaScript Tutorial",free:false,quizzes:5},
 bootstrap:{title:"Complete Bootstrap Tutorial",free:false,quizzes:4},
 jquery:{title:"Complete JQuery Tutorial",free:false,quizzes:4},
 sass:{title:"Complete SASS Tutorial",free:false,quizzes:4},
 php:{title:"Complete PHP Tutorial",free:false,quizzes:5},
 mysql:{title:"Complete MySQL Tutorial",free:false,quizzes:4},
 react:{title:"Complete React Tutorial",free:false,quizzes:5}
};

/* ================== STORAGE ================== */
const paidCourses = JSON.parse(localStorage.getItem("purchasedCourses")) || {};
const progress = JSON.parse(localStorage.getItem("quizProgress")) || {};
const container = document.getElementById("enrolledCourses");

if(!container){
 console.error("enrolledCourses container not found");
 return;
}

/* ================== BUILD ENROLLED COURSES ================== */
const enrolled = {};

// auto-enroll FREE courses
for(const key in courses){
 if(courses[key].free){
   enrolled[key] = true;
 }
}

// add PAID courses
for(const key in paidCourses){
 enrolled[key] = true;
}

/* ================== RENDER ================== */
if(Object.keys(enrolled).length === 0){
 container.innerHTML = "<p>You have not enrolled in any courses yet.</p>";
 return;
}

for(const key in enrolled){
 const course = courses[key];
 if(!course) continue;

 const done = progress[key] || 0;
 const percent = Math.round((done / course.quizzes) * 100);

container.innerHTML += `
<div class="box">
  <div class="thumb">
    <img src="images/thumb-${key === "html" ? 1 :
                              key === "css" ? 2 :
                              key === "javascript" ? 3 :
                              key === "bootstrap" ? 4 :
                              key === "jquery" ? 5 :
                              key === "sass" ? 6 :
                              key === "php" ? 7 :
                              key === "mysql" ? 8 : 9}.png">
    <span>${course.quizzes * 2} videos</span>
  </div>

  <h3 class="title">${course.title}</h3>
  <p>${course.free ? "FREE COURSE" : "PAID COURSE"}</p>


   <div class="progress-bar">
     <div class="progress" style="width:${percent}%"></div>
   </div>

   <p>${percent}% completed</p>

   <a href="playlist.html?course=${key}" class="inline-btn">
     Continue Learning
   </a>
 </div>
 `;
}

});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const courses = {
    html:{title:"Complete HTML Tutorial",quizzes:3},
    css:{title:"Complete CSS Tutorial",quizzes:3},
    javascript:{title:"Complete JavaScript Tutorial",quizzes:5},
    bootstrap:{title:"Complete Bootstrap Tutorial",quizzes:4},
    jquery:{title:"Complete JQuery Tutorial",quizzes:4},
    sass:{title:"Complete SASS Tutorial",quizzes:4},
    php:{title:"Complete PHP Tutorial",quizzes:5},
    mysql:{title:"Complete MySQL Tutorial",quizzes:4},
    react:{title:"Complete React Tutorial",quizzes:5}
  };

  const progress = JSON.parse(localStorage.getItem("quizProgress")) || {};
  const certContainer = document.getElementById("certificateContainer");

  if (!certContainer) return;

  let hasCertificate = false;

  for (const key in courses) {
    const completed = progress[key] || 0;
    const percent = Math.round((completed / courses[key].quizzes) * 100);

    if (percent === 100) {
      hasCertificate = true;

      const today = new Date().toLocaleDateString();

      certContainer.innerHTML += `
        <div class="box">
          <i class="fas fa-certificate" style="font-size:4rem; color:var(--main-color);"></i>
          <h3 class="title">${courses[key].title}</h3>
          <p style="font-size:1.6rem; color:var(--light-color);">
            completed on ${today}
          </p>

          <a href="certificate.html?course=${key}" class="inline-btn">
            download
          </a>
        </div>
      `;
    }
  }

  if (!hasCertificate) {
    certContainer.innerHTML = `
      <p style="font-size:1.6rem; color:var(--light-color);">
        No certificates available yet. Complete a course to 100%.
      </p>
    `;
  }
});
</script>

</body>
</html>
